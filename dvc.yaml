stages:
  preprocess:
    cmd: python src/preprocess.py
    deps:
      - src/preprocess.py
      - data/raw/customer_data.csv
      - data/raw/payment_data.csv
    outs:
      - data/processed
  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/final_data_preprocessed.csv
    outs:
      - data/split
      - models/model.pkl
  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - data/split/X_test.csv
      - data/split/y_test.csv
    outs:
      - models/metrics.json