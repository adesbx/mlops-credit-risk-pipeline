name: ML pipeline

on:
  pull_request:
    branches: [ "main" ]


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version : '3.12'
      - name: Dependencies
        run : |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run DVC pipeline
        run: |
          dvc pull
          dvc repro
      - name : Check metrics
        run : |
          python src/check_metrics.py
